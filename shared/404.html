<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found</title>
  <style>
    :root {
      --color-primary: #2563eb;
      --color-text: #111827;
      --color-text-muted: #6b7280;
      --color-bg: #ffffff;
      --font-family-base: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-family-base);
      color: var(--color-text);
      background: var(--color-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .error-page {
      text-align: center;
      max-width: 480px;
    }

    .error-page__code {
      font-size: 6rem;
      font-weight: 700;
      line-height: 1;
      color: var(--color-primary);
      margin-bottom: 1rem;
    }

    .error-page__title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .error-page__message {
      color: var(--color-text-muted);
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .error-page__links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .error-page__link {
      display: inline-block;
      padding: 0.5rem 1.5rem;
      border-radius: 0.375rem;
      text-decoration: none;
      font-weight: 500;
      transition: background 150ms ease;
    }

    .error-page__link--primary {
      background: var(--color-primary);
      color: #fff;
    }

    .error-page__link--primary:hover {
      background: #1d4ed8;
    }

    .error-page__link--secondary {
      background: #f3f4f6;
      color: var(--color-text);
    }

    .error-page__link--secondary:hover {
      background: #e5e7eb;
    }
  </style>
</head>
<body>
  <div class="error-page" data-testid="error-page">
    <div class="error-page__code">404</div>
    <h1 class="error-page__title">Page Not Found</h1>
    <p class="error-page__message">The page you're looking for doesn't exist or has been moved.</p>
    <div class="error-page__links">
      <a href="/hugo/" class="error-page__link error-page__link--primary">Hugo Home</a>
      <a href="/astro/" class="error-page__link error-page__link--secondary">Astro Home</a>
    </div>
  </div>
</body>
</html>
